services:
  openvpn:
    container_name: openvpn
    image: warkat/openvpn:2.7.0-no-configs
    restart: always
    tty: true
    dns:
      - 8.8.8.8
    networks:
      ovpn_net:
        ipv4_address: 172.19.0.2
    environment:
      - VPN_SRV_COMMON_NAME=openvpn-server.local
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - 1194:1194/udp
    volumes:
       - type: bind
         source: container-rootfs/etc/openvpn
         target: /etc/openvpn
       - type: bind
         source: container-rootfs/etc/dnsmasq
         target: /etc/dnsmasq
       - type: bind
         source: container-rootfs/srv/bin
         target: /srv/bin

networks:
  ovpn_net:
    name: ovpn_net
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/24
